version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postman_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postmandb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data


  api:
    build: .
    container_name: postman_api
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pgdata:
  
